syntax = "proto3";

package otrap.sensor.v1;

option go_package = "github.com/otrap/sensor/proto/sensorv1";

import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────────────────────
// SensorService — the sole communication channel between Sensor and Manager.
// All connections are INITIATED by the Sensor (outbound-only).
// All connections use mutual TLS (mTLS).
// ─────────────────────────────────────────────────────────────────────────────
service SensorService {
  // Join: one-time registration with a JOIN_TOKEN.
  // Manager validates token, issues mTLS client cert, returns config.
  rpc Join(JoinRequest) returns (JoinResponse);

  // EventStream: long-lived bidirectional stream.
  // Sensor sends events continuously; Manager sends commands back.
  rpc EventStream(stream SensorEvent) returns (stream ManagerCommand);

  // Heartbeat: unary RPC sent every 30 seconds.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // SyncMemoryWrite: sensor reports an S7 DB write for forensic recording.
  rpc SyncMemoryWrite(MemoryWriteRequest) returns (MemoryWriteResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Join
// ─────────────────────────────────────────────────────────────────────────────

message JoinRequest {
  string join_token    = 1; // Single-use, time-limited token
  string sensor_name   = 2; // Human-readable label (e.g. "ot-segment-a")
  string version       = 3; // Sensor binary semver (e.g. "1.0.0")
  repeated string capabilities = 4; // ["s7", "modbus", "hmi"]
  string local_ip      = 5; // Best-effort local IP for display
}

message JoinResponse {
  string sensor_id      = 1; // UUID assigned by Manager
  bytes  client_cert_pem = 2; // Signed mTLS client cert (PEM)
  bytes  client_key_pem  = 3; // Corresponding private key (PEM)
  bytes  ca_cert_pem     = 4; // Manager CA cert (PEM) for verifying server
  SensorConfig config    = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Sensor Configuration (delivered at join, updatable via ManagerCommand)
// ─────────────────────────────────────────────────────────────────────────────

message SensorConfig {
  // Protocol ports
  int32  s7_port           = 1;  // Default: 102
  int32  modbus_port       = 2;  // Default: 502
  int32  hmi_http_port     = 3;  // Default: 80
  int32  hmi_https_port    = 4;  // Default: 443

  // HMI TLS (self-signed auto-generated if empty)
  string hmi_tls_cert_pem  = 5;
  string hmi_tls_key_pem   = 6;

  // S7 behavior
  bool   stateful_s7_memory = 7;  // Enable read-back of written values
  string s7_plc_name        = 8;  // e.g. "S7-300/ET 200M station_1"
  string s7_module_type     = 9;  // e.g. "6ES7 315-2AG10-0AB0"
  string s7_serial_number   = 10; // e.g. "S C-C2UR28922012"

  // HMI behavior
  int32  brute_force_threshold = 11; // Login attempts before deceptive allow
  string hmi_brand_name        = 12; // e.g. "SIMATIC WinCC"
  string hmi_plant_name        = 13; // e.g. "Water Treatment Plant - Unit 3"

  // Operational
  int32  event_buffer_size     = 14; // Local ring buffer depth (default: 10000)
  int32  heartbeat_interval_s  = 15; // Default: 30
  int32  stream_flush_interval_ms = 16; // Default: 500
}

// ─────────────────────────────────────────────────────────────────────────────
// Events (Sensor → Manager)
// ─────────────────────────────────────────────────────────────────────────────

message SensorEvent {
  string   sensor_id   = 1;
  string   event_id    = 2; // UUID generated by sensor (dedup key)
  google.protobuf.Timestamp timestamp = 3;
  string   source_ip   = 4;
  int32    source_port = 5;
  int32    dst_port    = 6;
  Protocol protocol    = 7;
  EventType event_type = 8;
  Severity  severity   = 9;
  string raw_summary   = 10;
  bytes  raw_payload   = 11; // First 4096 bytes of raw traffic (for forensics)
  map<string, string> metadata   = 12; // Flexible k/v pairs
  repeated Artifact   artifacts  = 13;
  string session_hint  = 14; // "source_ip:source_port:proto" for session grouping
}

// ─────────────────────────────────────────────────────────────────────────────
// Enumerations
// ─────────────────────────────────────────────────────────────────────────────

enum Protocol {
  PROTOCOL_UNKNOWN  = 0;
  PROTOCOL_S7       = 1;
  PROTOCOL_MODBUS   = 2;
  PROTOCOL_HTTP     = 3;
  PROTOCOL_HTTPS    = 4;
  PROTOCOL_RAW_TCP  = 5;
  PROTOCOL_ENIP     = 6;  // EtherNet/IP (Allen-Bradley / Rockwell)
}

enum EventType {
  EVENT_UNKNOWN              = 0;

  // ── S7 / IEC 61131 ───────────────────────────────────────────
  S7_COTP_CONNECT            = 1;   // Severity: LOW
  S7_SETUP_COMM              = 2;   // Severity: LOW
  S7_SZL_READ                = 3;   // Severity: MEDIUM  (device discovery)
  S7_READ_VAR                = 4;   // Severity: MEDIUM
  S7_WRITE_VAR               = 5;   // Severity: HIGH
  S7_CPU_STOP                = 6;   // Severity: CRITICAL ← primary target
  S7_CPU_START               = 7;   // Severity: HIGH
  S7_UPLOAD_BLOCK            = 8;   // Severity: HIGH
  S7_DOWNLOAD_BLOCK          = 9;   // Severity: CRITICAL
  S7_DELETE_BLOCK            = 10;  // Severity: CRITICAL
  S7_MALFORMED_TPKT          = 11;  // Severity: LOW (scanner noise)
  S7_UNKNOWN_FUNCTION        = 12;  // Severity: MEDIUM
  S7_NON_TPKT_TRAFFIC        = 13;  // Severity: LOW
  S7_SESSION_TIMEOUT         = 14;  // Severity: NOISE
  S7_PARTIAL_PACKET          = 15;  // Severity: LOW
  S7_INVALID_COTP_TYPE       = 16;  // Severity: LOW

  // ── Modbus/TCP ────────────────────────────────────────────────
  MODBUS_CONNECT             = 20;
  MODBUS_READ_COILS          = 21;
  MODBUS_READ_DISCRETE       = 22;
  MODBUS_READ_HOLDING        = 23;
  MODBUS_READ_INPUT          = 24;
  MODBUS_WRITE_SINGLE_COIL   = 25;
  MODBUS_WRITE_SINGLE_REG    = 26;
  MODBUS_WRITE_MULTIPLE      = 27;  // Severity: HIGH
  MODBUS_UNKNOWN_FUNCTION    = 28;
  MODBUS_EXCEPTION_RESPONSE  = 29;
  MODBUS_SESSION_TIMEOUT     = 30;
  MODBUS_SCANNER_DETECTED    = 31;  // MEI Device Identification (fc=0x2B) — scanner probe

  // ── HMI / Web ─────────────────────────────────────────────────
  HMI_ACCESS                 = 40;  // Generic HTTP access
  HMI_LOGIN_ATTEMPT          = 41;  // Severity: MEDIUM
  HMI_LOGIN_SUCCESS          = 42;  // Deceptive allow — Severity: HIGH
  HMI_SQLI_PROBE             = 43;  // Severity: HIGH
  HMI_XSS_PROBE              = 44;  // Severity: MEDIUM
  HMI_CMD_INJECTION          = 45;  // Severity: HIGH
  HMI_PATH_TRAVERSAL         = 46;  // Severity: HIGH
  HMI_SENSITIVE_PATH         = 47;  // Severity: MEDIUM
  HMI_SCANNER_DETECTED       = 48;  // Severity: LOW
  HMI_DASHBOARD_ACCESS       = 49;  // Rabbit-hole engagement — Severity: HIGH

  // ── EtherNet/IP (Allen-Bradley / Rockwell) ────────────────────
  ENIP_LIST_IDENTITY         = 50;  // Severity: LOW  (scanner probe — very common)
  ENIP_LIST_SERVICES         = 51;  // Severity: LOW
  ENIP_REGISTER_SESSION      = 52;  // Severity: MEDIUM (active EtherNet/IP session)
  ENIP_SEND_RRDATA           = 53;  // Severity: MEDIUM (unconnected explicit message)
  ENIP_CIP_READ_TAG          = 54;  // Severity: MEDIUM (ControlLogix tag read)
  ENIP_CIP_WRITE_TAG         = 55;  // Severity: HIGH   (ControlLogix tag write)
  ENIP_CIP_GET_ATTR          = 56;  // Severity: LOW    (attribute enumeration)
  ENIP_CIP_SET_ATTR          = 57;  // Severity: HIGH   (attribute modification)
  ENIP_UNKNOWN_COMMAND       = 58;  // Severity: MEDIUM (malformed / unknown cmd)
  ENIP_SESSION_TIMEOUT       = 59;  // Severity: NOISE
}

enum Severity {
  SEVERITY_NOISE    = 0;
  SEVERITY_LOW      = 1;
  SEVERITY_MEDIUM   = 2;
  SEVERITY_HIGH     = 3;
  SEVERITY_CRITICAL = 4;
}

message Artifact {
  string artifact_type = 1; // "username"|"password"|"s7_payload"|"http_body"|"sql_payload"
  bytes  value         = 2;
  string encoding      = 3; // "utf8"|"hex"|"base64"
}

// ─────────────────────────────────────────────────────────────────────────────
// Commands (Manager → Sensor, via EventStream return)
// ─────────────────────────────────────────────────────────────────────────────

message ManagerCommand {
  oneof command {
    ConfigUpdate   config_update = 1;
    ShutdownSignal shutdown      = 2;
    PingCommand    ping          = 3;
    AckCommand     ack           = 4; // Acknowledge event receipt
  }
}

message ConfigUpdate  { SensorConfig new_config = 1; }
message ShutdownSignal { string reason = 1; }
message PingCommand   { string nonce = 1; }
message AckCommand    { string event_id = 1; }

// ─────────────────────────────────────────────────────────────────────────────
// Heartbeat
// ─────────────────────────────────────────────────────────────────────────────

message HeartbeatRequest {
  string sensor_id           = 1;
  int64  events_buffered     = 2;
  int64  events_sent_total   = 3;
  float  cpu_percent         = 4;
  uint64 mem_bytes_rss       = 5;
  repeated PortStatus port_status = 6;
  string uptime_seconds      = 7;
}

message PortStatus {
  int32  port            = 1;
  bool   listening       = 2;
  int64  active_conns    = 3;
  int64  total_conns     = 4;
}

message HeartbeatResponse {
  bool   ok      = 1;
  string message = 2;
  int64  server_time_unix = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// S7 Memory Sync
// ─────────────────────────────────────────────────────────────────────────────

message MemoryWriteRequest {
  string sensor_id  = 1;
  string session_id = 2; // Session hint for DB linkage
  int32  db_number  = 3;
  int32  byte_offset = 4;
  bytes  value      = 5;
  google.protobuf.Timestamp written_at = 6;
}

message MemoryWriteResponse {
  bool ok = 1;
}
